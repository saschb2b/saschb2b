name: Update README from blog feed

on:
  schedule:
    # Every day at 06:00 UTC (≈08:00 Europe/Berlin)
    - cron: "0 6 * * *"
  push:
    branches: [master]
    paths:
      - "scripts/update-blog.mjs"
      - ".github/workflows/update-readme.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh blog post list
        run: node scripts/update-blog.mjs

      - name: Commit changes if README changed
        run: |
          if git diff --quiet -- README.md; then
            echo "No README changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: refresh blog posts in README"
          git push
